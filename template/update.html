<!DOCTYPE html>
<html>
<head>
    <title>Update Product</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="container">
    <h2>Update Product</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Name:</label>
        <input type="text" name="nname" value="{{ prod.name }}">

        <label>Price:</label>
        <input type="number" name="nprice" value="{{ prod.price }}">

        <label>Stock:</label>
        <input type="number" name="nstock" value="{{ prod.stock }}">

        <label>Image URL:</label>
        <input type="text" name="nimg" value="{{ prod.img }}">

        <button type="submit">Update</button>
    </form>

    <a href="{% url 'view' %}" class="back">Back</a>
</div>

</body>
</html>
