<!DOCTYPE html>
<html>
<head>
    <title>View Products</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="container">
    <h1>All Products</h1>

    <div class="products-container">
        {% for item in items %}
        <div class="product">
            <h3>{{ item.name }}</h3>
            <p>Price: {{ item.price }}</p>
            <p>Stock: {{ item.stock }}</p>
            <img src="{{ item.img }}">
            
            <div class="actions">
                <a href="{% url 'update' item.id %}" class="update">Update</a>
                <a href="{% url 'delete' item.id %}" class="delete">Delete</a>
            </div>
        </div>
        {% endfor %}
    </div>

    <a href="{% url 'admin_view' %}" class="back">Back</a>
</div>

</body>
</html>
