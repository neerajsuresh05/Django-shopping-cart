<!DOCTYPE html>
<html>
<head>
    <title>Place Order</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="container">
    <h2>Checkout</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" name="address" required>
        </div>

        <div class="form-group">
            <label>Payment Method</label>
            <select name="payment" id="payment" onchange="showPaymentFields()">
                <option value="cod">Cash on Delivery</option>
                <option value="card">Card</option>
                <option value="upi">UPI</option>
            </select>
        </div>

        <!-- CARD -->
        <div id="card-box" style="display:none;">
            <input type="text" placeholder="Card Number" name="card">
        </div>

        <!-- UPI -->
        <div id="upi-box" style="display:none;">
            <input type="text" placeholder="UPI ID" name="upi">
        </div>

        <button type="submit">Confirm Order</button>
    </form>
</div>

<script>
function showPaymentFields() {
    let val = document.getElementById("payment").value;

    document.getElementById("card-box").style.display = (val === "card") ? "block" : "none";
    document.getElementById("upi-box").style.display = (val === "upi") ? "block" : "none";
}
</script>

</body>
</html>
